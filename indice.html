<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1e293b" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mis Gastos" />
  <title>Control de Gastos</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
      color: white;
      padding: 20px 16px 16px;
      text-align: center;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: .5px; }
    header p { font-size: .8rem; color: #94a3b8; margin-top: 2px; }

    .month-nav {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: #0f172a; padding: 10px 16px;
    }
    .month-nav button {
      background: none; border: none; color: #94a3b8; font-size: 1.3rem;
      cursor: pointer; padding: 0 4px; line-height: 1;
    }
    .month-nav button:hover { color: white; }
    #monthLabel { color: white; font-weight: 600; font-size: 1rem; min-width: 160px; text-align: center; }

    .summary {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
      padding: 14px 12px;
    }
    .summary-card {
      background: var(--card); border-radius: var(--radius); padding: 14px 10px;
      text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .summary-card .label { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .summary-card .amount { font-size: 1.05rem; font-weight: 700; margin-top: 4px; }
    .summary-card.income .amount { color: var(--green); }
    .summary-card.expense .amount { color: var(--red); }
    .summary-card.balance .amount { color: var(--blue); }

    .section { padding: 0 12px 12px; }
    .section-title {
      font-size: .75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .8px; color: var(--muted); margin-bottom: 10px;
    }

    /* Form */
    .form-card {
      background: var(--card); border-radius: var(--radius);
      padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .type-toggle {
      display: flex; border-radius: 8px; overflow: hidden;
      border: 1px solid var(--border); margin-bottom: 12px;
    }
    .type-toggle button {
      flex: 1; padding: 9px; border: none; cursor: pointer;
      font-weight: 600; font-size: .85rem; transition: all .2s;
      background: var(--bg); color: var(--muted);
    }
    .type-toggle button.active-income  { background: var(--green); color: white; }
    .type-toggle button.active-expense { background: var(--red);   color: white; }

    .form-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .form-row input, .form-row select,
    .form-card input, .form-card select {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 8px; font-size: .9rem; color: var(--text);
      background: var(--bg); outline: none;
    }
    .form-row input:focus, .form-row select:focus,
    .form-card input:focus, .form-card select:focus {
      border-color: var(--blue); background: white;
    }
    .form-row .w-half { width: 50%; }
    .btn-add {
      width: 100%; padding: 11px; background: var(--blue); color: white;
      border: none; border-radius: 8px; font-size: .95rem; font-weight: 700;
      cursor: pointer; margin-top: 4px; letter-spacing: .3px;
    }
    .btn-add:hover { background: #2563eb; }

    /* List */
    .tx-list { display: flex; flex-direction: column; gap: 8px; }
    .tx-item {
      background: var(--card); border-radius: var(--radius);
      padding: 12px 14px; display: flex; align-items: center; gap: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
    }
    .tx-icon {
      width: 38px; height: 38px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0;
    }
    .tx-icon.income  { background: #dcfce7; }
    .tx-icon.expense { background: #fee2e2; }
    .tx-info { flex: 1; min-width: 0; }
    .tx-desc { font-weight: 600; font-size: .9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-meta { font-size: .75rem; color: var(--muted); margin-top: 2px; }
    .tx-amount { font-weight: 700; font-size: .95rem; flex-shrink: 0; }
    .tx-amount.income  { color: var(--green); }
    .tx-amount.expense { color: var(--red); }
    .tx-del {
      background: none; border: none; cursor: pointer; color: #cbd5e1;
      font-size: 1rem; flex-shrink: 0; padding: 2px 4px;
    }
    .tx-del:hover { color: var(--red); }

    .empty { text-align: center; color: var(--muted); padding: 30px 0; font-size: .9rem; }

    /* Export */
    .btn-export {
      width: 100%; padding: 11px; background: #059669; color: white;
      border: none; border-radius: 8px; font-size: .9rem; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-export:hover { background: #047857; }

    /* Filter */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 10px; }
    .filter-bar select {
      flex: 1; padding: 8px 10px; border: 1px solid var(--border);
      border-radius: 8px; font-size: .85rem; color: var(--text);
      background: var(--card); outline: none;
    }

    /* Responsive desktop */
    @media (min-width: 640px) {
      body { max-width: 560px; margin: 0 auto; }
      header { border-radius: 0 0 16px 16px; margin-bottom: 4px; }
      .month-nav { border-radius: 0 0 12px 12px; margin-bottom: 4px; }
    }

    /* Chart bar */
    .chart-wrap { background: var(--card); border-radius: var(--radius); padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .chart-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .chart-label { font-size: .75rem; color: var(--muted); width: 90px; text-align: right; flex-shrink: 0; }
    .chart-bar-bg { flex: 1; height: 16px; background: var(--bg); border-radius: 8px; overflow: hidden; }
    .chart-bar-fill { height: 100%; border-radius: 8px; transition: width .4s; }
    .chart-val { font-size: .75rem; font-weight: 600; width: 60px; flex-shrink: 0; }
  </style>
</head>
<body>

<header>
  <h1>💰 Control de Gastos</h1>
  <p>Registra ingresos y gastos fácilmente</p>
</header>

<div class="month-nav">
  <button onclick="changeMonth(-1)">&#8249;</button>
  <span id="monthLabel"></span>
  <button onclick="changeMonth(1)">&#8250;</button>
</div>

<!-- Resumen -->
<div class="summary">
  <div class="summary-card income">
    <div class="label">Ingresos</div>
    <div class="amount" id="sumIncome">$0</div>
  </div>
  <div class="summary-card expense">
    <div class="label">Gastos</div>
    <div class="amount" id="sumExpense">$0</div>
  </div>
  <div class="summary-card balance">
    <div class="label">Balance</div>
    <div class="amount" id="sumBalance">$0</div>
  </div>
</div>

<!-- Formulario -->
<div class="section">
  <div class="section-title">Nueva transacción</div>
  <div class="form-card">
    <div class="type-toggle">
      <button id="btnIncome"  onclick="setType('income')"  class="active-income">+ Ingreso</button>
      <button id="btnExpense" onclick="setType('expense')">− Gasto</button>
    </div>
    <div class="form-row" style="margin-bottom:8px">
      <input id="fDesc" class="w-half" type="text" placeholder="Descripción" />
      <input id="fAmount" class="w-half" type="number" placeholder="Monto" min="0" step="0.01" />
    </div>
    <div class="form-row">
      <select id="fCat" class="w-half"></select>
      <input id="fDate" class="w-half" type="date" />
    </div>
    <button class="btn-add" onclick="addTransaction()">Agregar</button>
  </div>
</div>

<!-- Gráfico por categoría -->
<div class="section">
  <div class="section-title">Gastos por categoría</div>
  <div class="chart-wrap" id="chartWrap">
    <div class="empty">Sin gastos este mes</div>
  </div>
</div>

<!-- Lista -->
<div class="section">
  <div class="section-title">Movimientos</div>
  <div class="filter-bar">
    <select id="filterType" onchange="render()">
      <option value="all">Todos</option>
      <option value="income">Solo ingresos</option>
      <option value="expense">Solo gastos</option>
    </select>
    <select id="filterCat" onchange="render()">
      <option value="all">Todas las categorías</option>
    </select>
  </div>
  <div class="tx-list" id="txList"></div>
</div>

<!-- Exportar -->
<div class="section">
  <button class="btn-export" onclick="exportExcel()">
    📊 Exportar a Excel
  </button>
</div>

<div style="height:24px"></div>

<script>
const CATS = {
  expense: ['🛒 Alimentación','🚗 Transporte','🏠 Vivienda','💡 Servicios','🎬 Entretenimiento','👕 Ropa','🏥 Salud','📚 Educación','💳 Deudas','🔧 Mantenimiento','📦 Otros'],
  income:  ['💼 Salario','💻 Freelance','📈 Inversiones','🎁 Regalo','💵 Otros ingresos']
};
const ICONS = {
  '🛒 Alimentación':'🛒','🚗 Transporte':'🚗','🏠 Vivienda':'🏠','💡 Servicios':'💡',
  '🎬 Entretenimiento':'🎬','👕 Ropa':'👕','🏥 Salud':'🏥','📚 Educación':'📚',
  '💳 Deudas':'💳','🔧 Mantenimiento':'🔧','📦 Otros':'📦',
  '💼 Salario':'💼','💻 Freelance':'💻','📈 Inversiones':'📈','🎁 Regalo':'🎁','💵 Otros ingresos':'💵'
};

let currentType = 'income';
let currentYear, currentMonth;
let transactions = JSON.parse(localStorage.getItem('gastos_tx') || '[]');

function init() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  document.getElementById('fDate').value = now.toISOString().split('T')[0];
  setType('income');
  render();
}

function save() { localStorage.setItem('gastos_tx', JSON.stringify(transactions)); }

function fmt(n) {
  return '$' + parseFloat(n).toLocaleString('es', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  if (currentMonth > 11) { currentMonth = 0;  currentYear++; }
  render();
}

function setType(t) {
  currentType = t;
  const btnI = document.getElementById('btnIncome');
  const btnE = document.getElementById('btnExpense');
  btnI.className = t === 'income'  ? 'active-income'  : '';
  btnE.className = t === 'expense' ? 'active-expense' : '';
  const sel = document.getElementById('fCat');
  sel.innerHTML = CATS[t].map(c => `<option>${c}</option>`).join('');
}

function addTransaction() {
  const desc   = document.getElementById('fDesc').value.trim();
  const amount = parseFloat(document.getElementById('fAmount').value);
  const cat    = document.getElementById('fCat').value;
  const date   = document.getElementById('fDate').value;

  if (!desc)           { alert('Ingresa una descripción.'); return; }
  if (!amount || amount <= 0) { alert('Ingresa un monto válido.'); return; }
  if (!date)           { alert('Selecciona una fecha.'); return; }

  transactions.push({ id: Date.now(), type: currentType, desc, amount, cat, date });
  save();

  document.getElementById('fDesc').value   = '';
  document.getElementById('fAmount').value = '';
  render();
}

function deleteTransaction(id) {
  if (!confirm('¿Eliminar esta transacción?')) return;
  transactions = transactions.filter(t => t.id !== id);
  save();
  render();
}

function monthTx() {
  return transactions.filter(t => {
    const d = new Date(t.date + 'T00:00:00');
    return d.getFullYear() === currentYear && d.getMonth() === currentMonth;
  });
}

function render() {
  // Month label
  const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('monthLabel').textContent = months[currentMonth] + ' ' + currentYear;

  const mtx = monthTx();
  const income  = mtx.filter(t => t.type === 'income').reduce((s,t) => s + t.amount, 0);
  const expense = mtx.filter(t => t.type === 'expense').reduce((s,t) => s + t.amount, 0);
  document.getElementById('sumIncome').textContent  = fmt(income);
  document.getElementById('sumExpense').textContent = fmt(expense);
  const bal = income - expense;
  const balEl = document.getElementById('sumBalance');
  balEl.textContent = fmt(Math.abs(bal));
  balEl.style.color = bal >= 0 ? 'var(--blue)' : 'var(--red)';

  // Chart
  const expenses = mtx.filter(t => t.type === 'expense');
  const catMap = {};
  expenses.forEach(t => { catMap[t.cat] = (catMap[t.cat] || 0) + t.amount; });
  const catEntries = Object.entries(catMap).sort((a,b) => b[1]-a[1]);
  const chartEl = document.getElementById('chartWrap');
  if (catEntries.length === 0) {
    chartEl.innerHTML = '<div class="empty">Sin gastos este mes</div>';
  } else {
    const max = catEntries[0][1];
    chartEl.innerHTML = catEntries.map(([cat, val]) => `
      <div class="chart-row">
        <div class="chart-label">${cat}</div>
        <div class="chart-bar-bg">
          <div class="chart-bar-fill" style="width:${(val/max*100).toFixed(1)}%;background:var(--red);opacity:.75"></div>
        </div>
        <div class="chart-val" style="color:var(--red)">${fmt(val)}</div>
      </div>
    `).join('');
  }

  // Update category filter
  const filterCat = document.getElementById('filterCat');
  const prevCat = filterCat.value;
  const allCats = [...new Set(mtx.map(t => t.cat))].sort();
  filterCat.innerHTML = '<option value="all">Todas las categorías</option>' +
    allCats.map(c => `<option${c===prevCat?' selected':''}>${c}</option>`).join('');

  // Filter list
  const typeF = document.getElementById('filterType').value;
  const catF  = filterCat.value;
  let list = [...mtx].sort((a,b) => b.date.localeCompare(a.date));
  if (typeF !== 'all') list = list.filter(t => t.type === typeF);
  if (catF  !== 'all') list = list.filter(t => t.cat  === catF);

  const listEl = document.getElementById('txList');
  if (list.length === 0) {
    listEl.innerHTML = '<div class="empty">Sin movimientos este mes</div>';
    return;
  }
  listEl.innerHTML = list.map(t => {
    const icon = ICONS[t.cat] || (t.type === 'income' ? '💵' : '💸');
    const d = new Date(t.date + 'T00:00:00');
    const dateStr = d.toLocaleDateString('es', { day:'2-digit', month:'short' });
    return `
    <div class="tx-item">
      <div class="tx-icon ${t.type}">${icon}</div>
      <div class="tx-info">
        <div class="tx-desc">${esc(t.desc)}</div>
        <div class="tx-meta">${t.cat} · ${dateStr}</div>
      </div>
      <div class="tx-amount ${t.type}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div>
      <button class="tx-del" onclick="deleteTransaction(${t.id})">✕</button>
    </div>`;
  }).join('');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function exportExcel() {
  const wb = XLSX.utils.book_new();

  // Sheet 1: todos los movimientos del mes actual
  const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const mtx = monthTx().sort((a,b) => a.date.localeCompare(b.date));

  const rows = [['Fecha','Tipo','Descripción','Categoría','Monto']];
  mtx.forEach(t => {
    rows.push([t.date, t.type === 'income' ? 'Ingreso' : 'Gasto', t.desc, t.cat, t.amount]);
  });

  // Totals
  const income  = mtx.filter(t => t.type === 'income').reduce((s,t) => s + t.amount, 0);
  const expense = mtx.filter(t => t.type === 'expense').reduce((s,t) => s + t.amount, 0);
  rows.push([]);
  rows.push(['','','','Total Ingresos', income]);
  rows.push(['','','','Total Gastos',   expense]);
  rows.push(['','','','Balance',        income - expense]);

  const ws1 = XLSX.utils.aoa_to_sheet(rows);
  ws1['!cols'] = [{wch:12},{wch:10},{wch:30},{wch:22},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws1, months[currentMonth] + ' ' + currentYear);

  // Sheet 2: resumen histórico (todos los meses)
  const allMonths = {};
  transactions.forEach(t => {
    const key = t.date.substring(0,7);
    if (!allMonths[key]) allMonths[key] = { income: 0, expense: 0 };
    if (t.type === 'income')  allMonths[key].income  += t.amount;
    else                      allMonths[key].expense += t.amount;
  });
  const hist = [['Mes','Ingresos','Gastos','Balance']];
  Object.entries(allMonths).sort().forEach(([k,v]) => {
    hist.push([k, v.income, v.expense, v.income - v.expense]);
  });
  const ws2 = XLSX.utils.aoa_to_sheet(hist);
  ws2['!cols'] = [{wch:12},{wch:14},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Resumen histórico');

  // Sheet 3: gastos por categoría del mes
  const catMap = {};
  mtx.filter(t => t.type === 'expense').forEach(t => {
    catMap[t.cat] = (catMap[t.cat] || 0) + t.amount;
  });
  const catRows = [['Categoría','Total','% del gasto']];
  Object.entries(catMap).sort((a,b)=>b[1]-a[1]).forEach(([c,v]) => {
    catRows.push([c, v, expense > 0 ? +(v/expense*100).toFixed(1) : 0]);
  });
  const ws3 = XLSX.utils.aoa_to_sheet(catRows);
  ws3['!cols'] = [{wch:24},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws3, 'Por categoría');

  const filename = `Gastos_${months[currentMonth]}_${currentYear}.xlsx`;
  XLSX.writeFile(wb, filename);
}

init();

// Registro del Service Worker para funcionamiento offline
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'gastos-v1';
    const ASSETS = [self.location.href];
    self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS))));
    self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
</script>
</body>
</html>
